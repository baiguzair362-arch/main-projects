         body {
    margin: 0;
    padding: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #f4f6f9;
}

/* MAIN USER LIST */
#main{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
    padding: 30px;
}

/* USER CARD */
.box{
    background: white;
    height: 120px;
    border-radius: 12px;
    border: none;
    box-shadow: 0 6px 15px rgba(0,0,0,0.08);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: all .25s ease;
}

/* hover animation */
.box:hover{
    transform: translateY(-6px);
    box-shadow: 0 12px 25px rgba(0,0,0,0.15);
}

/* numbers */
.num{
    font-size: 22px;
    font-weight: bold;
    color: #555;
}

/* name */
.box h1{
    font-size: 20px;
    margin: 0;
    color: #222;
}

/* MODAL / DETAILS PANEL */
#main2{
    width: 450px;
    max-width: 90%;
    height: 80vh;
    background: white;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    z-index: 1000;
    border-radius: 14px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    overflow-y: auto;
    padding: 25px;
    display: none;
}

/* close button */
#main2 button{
    background: #ff4d4d;
    border: none;
    color: white;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    margin-bottom: 15px;
}

#main2 button:hover{
    background: #e63939;
}

/* user data rows */
#main2 div{
    padding: 10px 0;
    border-bottom: 1px solid #eee;
}

/* fonts inside modal */
.main2fonts{
    font-size: 16px;
}

.main2fonts:first-child{
    font-weight: 600;
    color: #333;
}
