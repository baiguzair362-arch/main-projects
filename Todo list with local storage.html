<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo list with local storage</title>
    <style>
        body {
           background-color: rgb(226, 226, 226);
        }
        nav {
           width: 100%;
           height: 150px;
           background-color: rgb(1, 1, 37);
           color: white;
           display: flex;
           justify-content: center;
           align-items: center;
           font-size: 70px;
        }
        #main {
            width: fit-content;
            height: fit-content;
            background-color: white;
            margin-left: 35%;
            margin-top: 30px;
            border-radius: 20px;
            padding: 100px;
        }
        #child1 {
            width: 100%;
            height: 50%;
            /* background-color: aqua; */
            display: flex;
            /* flex-direction: column; */
            justify-content: center;
            align-items: center;
            }
         #todoinp {
            height: fit-content;
            width: 200px;
            font-size: large;
         }   
         #addbtn {
            height: fit-content;
            width: fit-content;
            font-size: large;
            color: white;
            background-color: green;
         }
         #child2 {
            width: 100%;
            height: 50%;
            display: flex;
            flex-direction: column;
            /* justify-content: center; */
            align-items: center;
         }
         .box {
            width: fit-content;
            height: fit-content;
            border: 2px solid black;
            padding: 10px;
            margin-top: 10px;
         }
         .deletebtn {
            height: fit-content;
            width: fit-content;
            font-size: large;
            color: white;
            background-color: red;
            margin-left: 10px;
         }
         .changebtn {
            height: fit-content;
            width: fit-content;
            font-size: large;
            color: white;
            background-color: brown;
            margin-left: 10px;
         }
         #updatebtn {
            height: fit-content;
            width: fit-content;
            font-size: large;
            color: white;
            background-color: green;
            display: none;
         }
         .donebtn {
            height: fit-content;
            width: fit-content;
            font-size: large;
            color: white;
            background-color: gray;
            margin-left: 10px;
         }
         .notdonebtn {
            height: fit-content;
            width: fit-content;
            font-size: large;
            color: white;
            background-color: gray;
            margin-left: 10px;
         }
    </style>
</head>
<body>
    <nav>Todo list</nav>
    <div id="main">
        <div id="child1">
            <input type="text" name="Todos" id="todoinp" placeholder="enter todo">
            <button id="addbtn" onclick="add()">Add</button>  
            <button id="updatebtn" onclick="update()">update</button>           
        </div>
        <div id="child2"></div>
    </div>
    <script src="./app.js"></script>
</body>
</html>
